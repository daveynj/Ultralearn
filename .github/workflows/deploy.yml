name: Build and Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1 # Update if you chose a different region
  REPO_NAME: ultralearn-repo
  SERVICE_NAME: ultralearn
  JOB_NAME: ultralearn-migrate

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker push
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and Push Container
        run: |
          IMAGE_NAME=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker build -t $IMAGE_NAME .
          docker push $IMAGE_NAME
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      - name: Create/Update Migration Job
        run: |
          gcloud run jobs deploy ${{ env.JOB_NAME }} \
            --image ${{ env.IMAGE_NAME }} \
            --region ${{ env.REGION }} \
            --command "npx" \
            --args "prisma,migrate,deploy" \
            --service-account ${{ secrets.GCP_SA_EMAIL }} \
            --set-cloudsql-instances ${{ secrets.GCP_SQL_INSTANCE_NAME }} \
            --set-env-vars AUTH_TRUST_HOST=true \
            --set-secrets DATABASE_URL=DATABASE_URL:latest \
            --wait

      - name: Run Migrations
        run: |
          gcloud run jobs execute ${{ env.JOB_NAME }} --region ${{ env.REGION }} --wait

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE_NAME }}
          flags: '--allow-unauthenticated --service-account=${{ secrets.GCP_SA_EMAIL }} --add-cloudsql-instances=${{ secrets.GCP_SQL_INSTANCE_NAME }}'
          env_vars: |
            AUTH_TRUST_HOST=true
          secrets: |
            DATABASE_URL=DATABASE_URL:latest
            OPENROUTER_API_KEY=OPENROUTER_API_KEY:latest
            GOOGLE_AI_API_KEY=GOOGLE_AI_API_KEY:latest
            STABILITY_AI_API_KEY=STABILITY_AI_API_KEY:latest
            RUNWARE_API_KEY=RUNWARE_API_KEY:latest
            NEXTAUTH_SECRET=NEXTAUTH_SECRET:latest
            NEXTAUTH_URL=NEXTAUTH_URL:latest
            GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest
            GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest
            NEXT_PUBLIC_APP_URL=NEXT_PUBLIC_APP_URL:latest
            STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest
            STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest
            STRIPE_PRO_MONTHLY_PRICE_ID=STRIPE_PRO_MONTHLY_PRICE_ID:latest
            STRIPE_PRO_YEARLY_PRICE_ID=STRIPE_PRO_YEARLY_PRICE_ID:latest
            STRIPE_LIFETIME_PRICE_ID=STRIPE_LIFETIME_PRICE_ID:latest
